<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distilling Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* Light, bright, approachable palette */
  --bg:       #F7F4EF;   /* warm off-white */
  --bg2:      #FFFFFF;   /* pure white panels */
  --bg3:      #FDF9F4;   /* faint warm tint for cards */
  --bg4:      #F0EBE3;   /* input backgrounds */
  --border:   #E2D9CE;
  --border-light: #EDE6DC;

  /* Spirit colour system */
  --rum:      #C4622D;   /* warm amber-orange */
  --rum-light:#E8845A;
  --rum-pale: #FFF0E8;
  --rum-mid:  #F5CDB4;

  --vodka:    #3B82C4;   /* clear sky blue */
  --vodka-light:#6BAAD8;
  --vodka-pale:#EBF4FC;
  --vodka-mid:#BDDBF3;

  --gin:      #2D9E6B;   /* botanical green */
  --gin-light:#55C491;
  --gin-pale: #E8F7F1;
  --gin-mid:  #B4E8D2;

  --equip:    #7B5EA7;   /* equipment purple */
  --equip-light:#A084CC;
  --equip-pale:#F2EEF9;

  --freight:  #E0992A;   /* freight gold */
  --freight-pale:#FEF7E8;

  --prices:   #E05577;   /* prices pink-red */
  --prices-pale:#FEE8EF;

  /* Text */
  --text:     #2C2118;
  --text-2:   #6B5A4A;
  --text-3:   #9E8C7C;

  /* Best price green */
  --best:     #1A7A4A;
  --best-bg:  #E8F5EE;
  --best-border:#9ADCBA;

  --radius:   12px;
  --radius-sm:8px;
  --shadow:   0 2px 8px rgba(44,33,24,0.08);
  --shadow-md:0 4px 16px rgba(44,33,24,0.12);
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  min-height:100vh;
}

.app{max-width:860px;margin:0 auto;padding:16px;}

/* ── HEADER ── */
.hdr{
  background:var(--bg2);
  border-radius:var(--radius);
  padding:18px 20px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}
.hdr-left{}
.hdr-title{
  font-size:22px;
  font-weight:800;
  color:var(--text);
  letter-spacing:-0.3px;
}
.hdr-title span{color:var(--rum);}
.hdr-sub{font-size:12px;color:var(--text-3);margin-top:2px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.hdr-search{
  background:var(--bg4);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 12px;
  font-family:'Nunito',sans-serif;
  font-size:13px;
  color:var(--text);
  width:160px;
  transition:border-color 0.15s;
}
.hdr-search:focus{outline:none;border-color:var(--rum);}
.hdr-search::placeholder{color:var(--text-3);}
.upload-btn{
  background:var(--rum);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  padding:8px 16px;
  font-family:'Nunito',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:background 0.15s,transform 0.1s;
  white-space:nowrap;
}
.upload-btn:hover{background:var(--rum-light);}
.upload-btn:active{transform:scale(0.97);}

/* ── SPIRIT NAV ── */
.spirit-nav{
  display:flex;
  background:var(--bg2);
  border-radius:var(--radius);
  padding:6px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
  gap:4px;
  overflow-x:auto;
}
.spirit-btn{
  flex:1;
  min-width:72px;
  padding:10px 8px;
  font-family:'Nunito',sans-serif;
  font-size:12px;
  font-weight:700;
  color:var(--text-3);
  background:transparent;
  border:none;
  border-radius:var(--radius-sm);
  cursor:pointer;
  text-align:center;
  white-space:nowrap;
  transition:background 0.15s,color 0.15s;
  letter-spacing:0.2px;
}
.spirit-btn .icon{display:block;font-size:18px;margin-bottom:2px;}
.spirit-btn:hover:not(.active){background:var(--bg4);color:var(--text-2);}
.spirit-btn.active-rum{background:var(--rum-pale);color:var(--rum);}
.spirit-btn.active-vodka{background:var(--vodka-pale);color:var(--vodka);}
.spirit-btn.active-gin{background:var(--gin-pale);color:var(--gin);}
.spirit-btn.active-equipment{background:var(--equip-pale);color:var(--equip);}
.spirit-btn.active-freight{background:var(--freight-pale);color:var(--freight);}
.spirit-btn.active-prices{background:var(--prices-pale);color:var(--prices);}

/* ── STILL NAV ── */
.still-nav{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.still-btn{
  flex:1;
  padding:10px 12px;
  font-family:'Nunito',sans-serif;
  font-size:12px;
  font-weight:700;
  color:var(--text-3);
  background:var(--bg2);
  border:2px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;
  text-align:center;
  transition:all 0.15s;
}
.still-btn .still-icon{font-size:16px;display:block;margin-bottom:2px;}
.still-btn:hover:not(.active){border-color:var(--text-3);color:var(--text-2);}
.still-btn.active{color:#fff;border-color:transparent;}
.still-btn.active.rum-still{background:var(--rum);}
.still-btn.active.vodka-still{background:var(--vodka);}
.still-btn.active.gin-still{background:var(--gin);}

/* ── RECIPE TABS ── */
.tabs{
  display:flex;
  gap:6px;
  margin-bottom:10px;
  overflow-x:auto;
  padding-bottom:2px;
}
.tab{
  padding:7px 14px;
  font-family:'Nunito',sans-serif;
  font-size:12px;
  font-weight:700;
  color:var(--text-3);
  background:var(--bg2);
  border:2px solid var(--border);
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
  transition:all 0.15s;
  display:flex;
  align-items:center;
  gap:4px;
}
.tab:hover:not(.active){border-color:var(--text-3);color:var(--text-2);}
.tab.active-rum{background:var(--rum);color:#fff;border-color:var(--rum);}
.tab.active-vodka{background:var(--vodka);color:#fff;border-color:var(--vodka);}
.tab.active-gin{background:var(--gin);color:#fff;border-color:var(--gin);}

.panel{display:none;}
.panel.active{display:block;}

/* ── CARDS ── */
.card{
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.card-title{
  font-size:15px;
  font-weight:800;
  color:var(--text);
  margin-bottom:4px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
}
.card-desc{font-size:12px;color:var(--text-3);margin-bottom:12px;font-weight:600;}

/* Still badge */
.still-badge{
  font-size:10px;
  font-weight:700;
  padding:3px 8px;
  border-radius:20px;
  letter-spacing:0.3px;
}
.badge-air{background:var(--vodka-pale);color:var(--vodka);}
.badge-reflux{background:var(--gin-pale);color:var(--gin);}

/* Still note */
.still-note{
  background:var(--bg3);
  border-left:3px solid var(--rum);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:10px 12px;
  font-size:12px;
  color:var(--text-2);
  margin-bottom:12px;
  line-height:1.6;
  font-weight:600;
}
.still-note.vodka-note{border-left-color:var(--vodka);}
.still-note.gin-note{border-left-color:var(--gin);}

/* Pro/con */
.pro-con{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pro-box{background:var(--best-bg);border:1.5px solid var(--best-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--best);line-height:1.6;font-weight:600;}
.con-box{background:#FEF0F0;border:1.5px solid #F5C6C6;border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:#B84040;line-height:1.6;font-weight:600;}
.pro-box strong,.con-box strong{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px;opacity:0.8;}

/* Ingredient rows */
.ing-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border-light);
  gap:8px;
  flex-wrap:wrap;
}
.ing-row:last-child{border-bottom:none;}
.ing-left{min-width:120px;flex:1;}
.ing-name{font-size:13px;font-weight:700;color:var(--text);}
.ing-qty{font-size:11px;color:var(--text-3);margin-top:2px;font-weight:600;}
.price-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.ptag{
  font-family:'DM Mono',monospace;
  font-size:11px;
  padding:3px 8px;
  border-radius:6px;
  background:var(--bg4);
  color:var(--text-2);
  border:1px solid var(--border);
  white-space:nowrap;
}
.ptag.best{
  background:var(--best-bg);
  color:var(--best);
  border-color:var(--best-border);
  font-weight:500;
}
.ptag.unknown{background:var(--freight-pale);color:var(--freight);border-color:var(--freight-mid,#F5D898);}

/* Section label */
.sec-label{
  font-size:10px;
  font-weight:800;
  color:var(--text-3);
  text-transform:uppercase;
  letter-spacing:0.8px;
  margin:14px 0 8px;
}

/* Supplier totals grid */
.totals-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:8px;
  margin-bottom:8px;
}
.sup-card{
  background:var(--bg3);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px;
  transition:border-color 0.15s;
}
.sup-card.best-s{
  background:var(--best-bg);
  border-color:var(--best-border);
}
.sup-card .sname{font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
.sup-card.best-s .sname{color:var(--best);}
.sup-card .samount{font-size:20px;font-weight:800;color:var(--text);font-family:'DM Mono',monospace;}
.sup-card.best-s .samount{color:var(--best);}
.sup-card .sfreight{font-size:10px;color:var(--text-3);margin-top:3px;font-weight:600;}
.sup-card .spl{font-size:10px;color:var(--text-3);margin-top:2px;font-family:'DM Mono',monospace;}
.best-chip{display:inline-block;font-size:9px;font-weight:800;color:var(--best);background:var(--best-bg);border:1px solid var(--best-border);border-radius:20px;padding:1px 6px;letter-spacing:0.4px;text-transform:uppercase;margin-left:4px;}

.footnote{font-size:11px;color:var(--text-3);font-style:italic;margin-top:4px;font-weight:600;}

/* ── EQUIPMENT ── */
.add-bar{
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.add-bar h3{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;}
.add-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.add-fields input,.add-fields select{
  padding:8px 10px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Nunito',sans-serif;
  font-size:13px;
  background:var(--bg4);
  color:var(--text);
  width:100%;
}
.add-fields input:focus,.add-fields select:focus{outline:none;border-color:var(--equip);}
.full-col{grid-column:1/-1;}
.add-btn{
  width:100%;
  padding:10px;
  background:var(--equip);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-family:'Nunito',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:background 0.15s;
}
.add-btn:hover{background:var(--equip-light);}

.equip-card{
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  padding:12px 14px;
  margin-bottom:8px;
  box-shadow:var(--shadow);
}
.equip-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.equip-name{font-size:13px;font-weight:700;color:var(--text);}
.equip-meta{font-size:11px;color:var(--text-3);margin-top:2px;font-weight:600;}
.del-btn{
  font-size:11px;
  color:#B84040;
  background:#FEF0F0;
  border:1px solid #F5C6C6;
  border-radius:6px;
  padding:4px 10px;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  font-weight:700;
}

.sup-price-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  background:var(--bg3);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  margin-bottom:4px;
  flex-wrap:wrap;
}
.sup-price-row.best-row{background:var(--best-bg);border-color:var(--best-border);}
.sup-label{font-size:12px;font-weight:700;color:var(--text-2);min-width:62px;}
.sup-price-row.best-row .sup-label{color:var(--best);}
.search-link{
  font-size:11px;
  color:var(--rum);
  text-decoration:none;
  padding:3px 8px;
  background:var(--rum-pale);
  border:1px solid var(--rum-mid);
  border-radius:6px;
  white-space:nowrap;
  font-weight:700;
}
.search-link:hover{background:var(--rum-mid);}
.price-input{
  width:70px;
  padding:5px 8px;
  border:1.5px solid var(--border);
  border-radius:6px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  text-align:right;
  background:var(--bg2);
  color:var(--text);
  margin-left:auto;
}
.price-input:focus{outline:none;border-color:var(--equip);}
.landed-val{
  font-family:'DM Mono',monospace;
  font-size:12px;
  font-weight:500;
  color:var(--best);
  min-width:56px;
  text-align:right;
}
.best-badge{
  font-size:9px;
  font-weight:800;
  color:var(--best);
  background:var(--best-bg);
  border:1px solid var(--best-border);
  padding:2px 6px;
  border-radius:20px;
  text-transform:uppercase;
  letter-spacing:0.3px;
}

/* ── CAT HEADER ── */
.cat-header{
  font-size:10px;
  font-weight:800;
  color:var(--text-3);
  text-transform:uppercase;
  letter-spacing:0.8px;
  margin:14px 0 8px;
  padding-bottom:6px;
  border-bottom:1.5px solid var(--border);
}

/* ── FREIGHT ── */
.info-note{
  background:var(--freight-pale);
  border:1.5px solid #F5D898;
  border-radius:var(--radius-sm);
  padding:12px 14px;
  font-size:12px;
  color:#8A6010;
  margin-bottom:14px;
  line-height:1.6;
  font-weight:600;
}
.freight-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid var(--border-light);
  flex-wrap:wrap;
  gap:10px;
}
.freight-row:last-child{border-bottom:none;}
.freight-name{font-size:13px;font-weight:700;color:var(--text);}
.freight-url{font-size:11px;color:var(--text-3);margin-top:2px;font-weight:600;}
.freight-url a{color:var(--rum);}
.freight-inputs{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.freight-field{display:flex;align-items:center;gap:5px;}
.freight-field span{font-size:11px;color:var(--text-3);font-weight:700;white-space:nowrap;}
.freight-field input{
  width:68px;
  padding:6px 8px;
  border:1.5px solid var(--border);
  border-radius:6px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  text-align:right;
  background:var(--bg4);
  color:var(--text);
}
.freight-field input:focus{outline:none;border-color:var(--freight);}

/* ── PRICES ── */
.edit-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 0;
  border-bottom:1px solid var(--border-light);
}
.edit-row:last-child{border-bottom:none;}
.edit-row label{font-size:12px;font-weight:700;color:var(--text-2);flex:1;}
.edit-row input{
  width:76px;
  padding:5px 8px;
  border:1.5px solid var(--border);
  border-radius:6px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  text-align:right;
  background:var(--bg4);
  color:var(--text);
}
.edit-row input:focus{outline:none;border-color:var(--prices);}
.edit-row .unit{font-size:10px;color:var(--text-3);min-width:32px;font-weight:700;}
.sup-url{font-size:11px;margin-bottom:10px;}
.sup-url a{color:var(--rum);font-weight:700;}

/* ── MODAL ── */
.modal-wrap{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(44,33,24,0.5);
  display:flex;align-items:center;justify-content:center;
  padding:20px;z-index:1000;
  backdrop-filter:blur(3px);
}
.modal{
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  width:100%;
  max-width:420px;
  box-shadow:var(--shadow-md);
}
.modal h3{font-size:16px;font-weight:800;margin-bottom:6px;color:var(--text);}
.modal p{font-size:12px;color:var(--text-3);margin-bottom:12px;line-height:1.5;font-weight:600;}
.modal input,.modal textarea,.modal select{
  width:100%;
  padding:9px 11px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Nunito',sans-serif;
  font-size:13px;
  margin-bottom:10px;
  background:var(--bg4);
  color:var(--text);
}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--rum);}
.modal textarea{height:110px;resize:vertical;}
.parsed-preview{
  background:var(--best-bg);
  border:1.5px solid var(--best-border);
  border-radius:var(--radius-sm);
  padding:10px 12px;
  font-size:12px;
  color:var(--best);
  line-height:1.8;
  margin-bottom:10px;
  font-weight:600;
}
.confirm-btn{
  width:100%;
  padding:11px;
  background:var(--rum);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-family:'Nunito',sans-serif;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  margin-top:4px;
  transition:background 0.15s;
}
.confirm-btn:hover{background:var(--rum-light);}
.cancel-btn{
  width:100%;
  padding:9px;
  background:transparent;
  color:var(--text-3);
  border:none;
  font-family:'Nunito',sans-serif;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  margin-top:4px;
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .app{padding:10px;}
  .hdr{padding:14px;}
  .hdr-title{font-size:18px;}
  .hdr-search{width:120px;}
  .spirit-btn{min-width:52px;padding:8px 4px;font-size:11px;}
  .spirit-btn .icon{font-size:16px;}
  .pro-con{grid-template-columns:1fr;}
  .totals-grid{grid-template-columns:repeat(2,1fr);}
  .sup-price-row{gap:5px;}
  .price-input{width:60px;}
  .add-fields{grid-template-columns:1fr;}
}
@media(max-width:380px){
  .spirit-btn span.label{display:none;}
  .spirit-btn .icon{font-size:20px;margin-bottom:0;}
  .totals-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-title">Distilling <span>Tracker</span></div>
      <div class="hdr-sub">Landed cost across all suppliers</div>
    </div>
    <div class="hdr-right">
      <input type="text" class="hdr-search" placeholder="Search..." oninput="globalSearch(this.value)">
      <button class="upload-btn" onclick="triggerUpload()">⬆ Upload recipe</button>
    </div>
  </div>

  <!-- SPIRIT NAV -->
  <div class="spirit-nav">
    <button class="spirit-btn" id="snav-rum" onclick="switchSpirit('rum')"><span class="icon">🥃</span><span class="label">Rum</span></button>

function ingById(id){return INGS.find(i=>i.id===id);}
function fmt(n){return n==null?'—':'$'+n.toFixed(2);}
function fmtF(n){return n===0?'Free shipping':'+ $'+n.toFixed(2)+' freight';}
function allEquip(){return[...BUILTIN_EQUIP,...customEquip];}
function bestLanded(item){let b=null,bc=Infinity;SUPS.forEach(s=>{const p=item.p[s.id];if(p!=null){const l=p+freight(s.id,p);if(l<bc){bc=l;b=s.id;}}});return b;}

function recipeTotals(items){
  const totals={};
  SUPS.forEach(s=>{
    let t=0,ok=true;
    items.forEach(it=>{const i=ingById(it.id);const p=i?i.p[s.id]:null;if(p==null)ok=false;else t+=p*it.qty;});
    if(ok){const f=freight(s.id,t);totals[s.id]={products:t,freight:f,total:t+f};}else totals[s.id]=null;
  });
  let best=null,bc=Infinity;
  Object.entries(totals).forEach(([sid,v])=>{if(v!=null&&v.total<bc){bc=v.total;best=sid;}});
  return{totals,best};
}

function buildRecipeHTML(r){
  const{totals,best}=recipeTotals(r.items);
  const stillLabel=r.stillType==='air'?'4.5L Air Still':'23L Reflux Still';
  const stillClass=r.stillType==='air'?'air':'reflux';
  const noteClass=r.spirit==='vodka'?'vodka-note':r.spirit==='gin'?'gin-note':'';

  let ih='';
  r.items.forEach(it=>{
    const i=ingById(it.id);
    if(!i){ih+=`<div class="ing-row"><div class="ing-left"><div class="ing-name">${it.id}</div><div class="ing-qty">${it.lbl}</div></div><div class="price-tags"><span class="ptag unknown">Not priced</span></div></div>`;return;}
    let b=null,bc=Infinity;
    SUPS.forEach(s=>{const p=i.p[s.id];if(p!=null&&p*it.qty<bc){bc=p*it.qty;b=s.id;}});
    let tags='';
    SUPS.forEach(s=>{const p=i.p[s.id];if(p==null)return;tags+=`<span class="ptag${s.id===b?' best':''}">${s.short}: ${fmt(p*it.qty)}</span>`;});
    ih+=`<div class="ing-row"><div class="ing-left"><div class="ing-name">${i.name}</div><div class="ing-qty">${it.lbl}</div></div><div class="price-tags">${tags||'<span class="ptag unknown">Not priced</span>'}</div></div>`;
  });

  let pcHTML='';
  if(r.prosCons){
    pcHTML=`<div class="pro-con"><div class="pro-box"><strong>✓ Pros</strong>${r.prosCons.pros}</div><div class="con-box"><strong>✗ Cons</strong>${r.prosCons.cons}</div></div>`;
  }

  let th='';
  SUPS.forEach(s=>{
    const v=totals[s.id];if(v==null)return;
    const isBest=s.id===best;
    th+=`<div class="sup-card${isBest?' best-s':''}"><div class="sname">${s.name}${isBest?'<span class="best-chip">best</span>':''}</div><div class="samount">${fmt(v.total)}</div><div class="sfreight">${fmtF(v.freight)}</div><div class="spl">${fmt(v.products)} products · ${fmt(v.total/r.litres)}/L</div></div>`;
  });

  return `<div class="card">
    <div class="card-title">${r.title} <span class="still-badge badge-${stillClass}">${stillLabel}</span></div>
    <div class="card-desc">${r.desc}</div>
    ${r.stillNote?`<div class="still-note ${noteClass}">💡 ${r.stillNote}</div>`:''}
    ${pcHTML}
    ${ih}
  </div>
  <div class="sec-label">Landed cost by supplier</div>
  <div class="totals-grid">${th||'<p class="footnote">No supplier stocks all ingredients.</p>'}</div>
  <p class="footnote">Freight applied automatically · ${r.litres}L wash basis</p>`;
}

function getRecipeSet(spirit,still){
  const sets={rum:{air:RUM_AIR,reflux:RUM_REFLUX},vodka:{air:VODKA_AIR,reflux:VODKA_REFLUX},gin:{air:GIN_AIR,reflux:GIN_REFLUX}};
  return sets[spirit]?.[still]||{};
}
function getActiveTab(spirit){return spirit==='rum'?activeRumTab:spirit==='vodka'?activeVodkaTab:activeGinTab;}
function setActiveTab(spirit,key){if(spirit==='rum')activeRumTab=key;else if(spirit==='vodka')activeVodkaTab=key;else activeGinTab=key;}
function getActiveStill(spirit){return spirit==='rum'?activeRumStill:spirit==='vodka'?activeVodkaStill:activeGinStill;}

function renderSpiritSection(spirit){
  const still=getActiveStill(spirit);
  const recipes=getRecipeSet(spirit,still);
  const activeTab=getActiveTab(spirit);
  const tabsEl=document.getElementById(spirit+'-tabs');
  const panelsEl=document.getElementById(spirit+'-panels');
  if(!tabsEl||!panelsEl)return;
  tabsEl.innerHTML='';panelsEl.innerHTML='';
  Object.entries(recipes).forEach(([key,r])=>{
    const isActive=key===activeTab;
    const tab=document.createElement('div');
    tab.className=`tab${isActive?' active-'+spirit:''}`;
    tab.textContent=r.title;
    tab.onclick=()=>switchSpiritTab(spirit,key);
    tabsEl.appendChild(tab);
    const panel=document.createElement('div');
    panel.id=`panel-${spirit}-${key}`;
    panel.className='panel'+(isActive?' active':'');
    panel.innerHTML=buildRecipeHTML(r);
    panelsEl.appendChild(panel);
  });
}

function switchSpiritTab(spirit,key){
  setActiveTab(spirit,key);
  const still=getActiveStill(spirit);
  const recipes=getRecipeSet(spirit,still);
  document.querySelectorAll(`#${spirit}-tabs .tab`).forEach((t,i)=>{
    const k=Object.keys(recipes)[i];
    t.className=`tab${k===key?' active-'+spirit:''}`;
  });
  document.querySelectorAll(`#${spirit}-panels .panel`).forEach(p=>p.classList.remove('active'));
  const el=document.getElementById(`panel-${spirit}-${key}`);
  if(el)el.classList.add('active');
}

function switchRumStill(still){

  document.getElementById('rstill-air').classList.toggle('active',still==='air');
  document.getElementById('rstill-reflux').classList.toggle('active',still==='reflux');

function switchSpirit(name){
  activeSpirit=name;
  ['rum','vodka','gin','equipment','freight','prices'].forEach(s=>{
    const sec=document.getElementById('section-'+s);
    if(sec)sec.style.display=s===name?'block':'none';
  });
  document.querySelectorAll('.spirit-btn').forEach(btn=>btn.className='spirit-btn');
  const ab=document.getElementById('snav-'+name);
  if(ab)ab.classList.add('active-'+name);
  if(name==='rum'){renderSpiritSection('rum');switchRumStill(activeRumStill);}
  if(name==='vodka'){renderSpiritSection('vodka');switchVodkaStill(activeVodkaStill);}
  if(name==='gin'){renderSpiritSection('gin');switchGinStill(activeGinStill);}
  if(name==='equipment')renderEquipPanel();
  if(name==='freight')renderFreightPanel();
  if(name==='prices')renderPricesPanel();
}

function renderEquipPanel(){
  const panel=document.getElementById('equip-panel');
  const catOpts=EQUIP_CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
  let html=`<div class="add-bar"><h3>Add equipment item</h3><div class="add-fields"><input class="full-col" type="text" id="eq-name" placeholder="Item name (e.g. Refractometer)"><select id="eq-cat">${catOpts}</select><input type="text" id="eq-unit" placeholder="Unit e.g. /ea" value="/ea"></div><button class="add-btn" onclick="addCustomEquip()">Add item — supplier search links appear instantly</button></div>`;
  const groups={};
  allEquip().forEach(item=>{const cat=item.cat||'Custom';if(!groups[cat])groups[cat]=[];groups[cat].push(item);});
  EQUIP_CATS.forEach(cat=>{
    const items=groups[cat];if(!items||!items.length)return;
    html+=`<div class="card"><div class="card-title">${cat}</div><div class="card-desc">Landed cost inc. freight · tap Search to check current price</div>`;
    items.forEach(item=>{
      const best=bestLanded(item);const isCustom=!!item.custom;
      const st=encodeURIComponent(item.name);
      let rows='';
      SUPS.forEach(s=>{
        const p=item.p[s.id]!=null?item.p[s.id]:null;
        const f=p!=null?freight(s.id,p):0;
        const landed=p!=null?p+f:null;
        const isBest=s.id===best&&landed!=null;
        rows+=`<div class="sup-price-row${isBest?' best-row':''}">
          <span class="sup-label">${s.short}${isBest?' ✓':''}</span>
          <a href="${s.search+st}" target="_blank" class="search-link">Search</a>
          <input type="number" class="price-input" step="0.01" min="0" value="${p!=null?p:''}" placeholder="—" oninput="updEquipPrice('${item.id}','${s.id}',this.value)">
          <span class="landed-val">${landed!=null?'→ '+fmt(landed):''}</span>
          ${isBest?'<span class="best-badge">best</span>':''}
        </div>`;
      });
      html+=`<div class="equip-card"><div class="equip-header"><div><div class="equip-name">${item.name}</div><div class="equip-meta">${item.unit}${isCustom?' · custom':''}</div></div>${isCustom?`<button class="del-btn" onclick="delCustomEquip('${item.id}')">Remove</button>`:''}</div>${rows}</div>`;
    });
    html+=`</div>`;
  });
  panel.innerHTML=html;
}
function addCustomEquip(){
  const name=document.getElementById('eq-name').value.trim();
  const cat=document.getElementById('eq-cat').value;
  const unit=document.getElementById('eq-unit').value.trim()||'/ea';
  if(!name){alert('Enter an item name.');return;}
  const p={};SUPS.forEach(s=>p[s.id]=null);
  customEquip.push({id:'custom_'+Date.now(),name,cat,unit,p,custom:true});
  document.getElementById('eq-name').value='';
  renderEquipPanel();
}
function delCustomEquip(id){if(!confirm('Remove this item?'))return;customEquip=customEquip.filter(i=>i.id!==id);renderEquipPanel();}
function updEquipPrice(itemId,supId,val){
  const price=val===''?null:(parseFloat(val)||null);
  const bi=BUILTIN_EQUIP.find(i=>i.id===itemId);
  if(bi)bi.p[supId]=price;
  else{const ci=customEquip.find(i=>i.id===itemId);if(ci)ci.p[supId]=price;}
  renderEquipPanel();
}

  let h='<div class="info-note">📦 Set your flat freight rate per supplier. Orders over the free threshold ship for free — drops to $0 automatically across all calculations.</div>';
  h+='<div class="card"><div class="card-title">Freight rates — QLD postcode</div><div class="card-desc">Update whenever rates change</div>';
  SUPS.forEach(s=>{
    const f=FREIGHT[s.id];
    h+=`<div class="freight-row"><div><div class="freight-name">${s.name}</div><div class="freight-url"><a href="https://${s.url}" target="_blank">${s.url}</a></div></div>

      <div class="freight-field"><span>Flat $</span><input type="number" step="0.50" min="0" value="${f.rate}" oninput="updFreight('${s.id}','rate',this.value)"></div>

  h+='</div><p class="footnote">Freight is factored into every recipe total and equipment landed cost automatically.</p>';

function updFreight(supId,field,val){
  if(field==='rate')FREIGHT[supId].rate=val===''?0:(parseFloat(val)||0);
  if(field==='freeOver')FREIGHT[supId].freeOver=val===''?null:(parseFloat(val)||null);
  if(activeSpirit==='rum')renderSpiritSection('rum');
  if(activeSpirit==='vodka')renderSpiritSection('vodka');
  if(activeSpirit==='gin')renderSpiritSection('gin');
  if(activeSpirit==='equipment')renderEquipPanel();
}

  let h='<div class="info-note">💲 Update ingredient prices here. Equipment prices are managed in the Gear tab via supplier search links.</div>';
  const ingCats=[...new Set(INGS.map(i=>i.cat))];

function triggerUpload(){document.getElementById('file-input').click();}
function handleFile(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='txt'){const r=new FileReader();r.onload=e=>processText(e.target.result,file.name);r.readAsText(file);}
  else if(ext==='docx'){const r=new FileReader();r.onload=e=>{if(typeof mammoth!=='undefined'){mammoth.extractRawText({arrayBuffer:e.target.result}).then(res=>processText(res.value,file.name)).catch(()=>processText('',file.name));}else processText('',file.name);};r.readAsArrayBuffer(file);}
  else if(ext==='pdf')showModal('pdf',{filename:file.name});
  input.value='';
}
function processText(text,filename){
  const lines=text.split('\n');const items=[],unknowns=[];let litres=25;
  const lm=text.match(/(\d+)\s*L\s*(wash|batch)/i)||text.match(/(\d+)\s*litre/i);
  if(lm)litres=parseInt(lm[1]);
  lines.forEach(line=>{
    if(!line.trim()||line.length<4)return;
    const ll=line.toLowerCase();let matched=false;
    INGS.forEach(ing=>{
      if(matched)return;if(!ing.keywords.some(k=>ll.includes(k)))return;
      let qty=1,lbl='1 unit';
      const m=line.match(/(\d+\.?\d*)\s*(kg|g|lb|pkt|packet)/i);
      if(m){qty=parseFloat(m[1]);lbl=`${m[1]} ${m[2]}`;if(m[2].toLowerCase()==='g')qty/=1000;}
      items.push({id:ing.id,qty,lbl});matched=true;
    });
    if(!matched&&line.match(/\d/)&&!line.match(/^(step|method|note|tip|warning|figure|#)/i))unknowns.push(line.trim().slice(0,60));
  });
  const title=filename.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  pendingRecipe={title,litres,items,unknowns,desc:'Uploaded recipe'};
  showModal('confirm',{title,items,unknowns,litres});
}
function showModal(type,data){
  const root=document.getElementById('modal-root');
  if(type==='confirm'){
    const{title,items,unknowns,litres}=data;
    const preview=items.map(it=>`<div>+ <strong>${ingById(it.id)?ingById(it.id).name:it.id}</strong> — ${it.lbl}</div>`).join('');
    root.innerHTML=`<div class="modal-wrap"><div class="modal"><h3>Recipe detected</h3><p>Found ${items.length} ingredient(s) in a ${litres}L batch.</p><input type="text" id="rname" value="${title}"><div class="parsed-preview">${preview||'No recognised ingredients.'}</div>${unknowns.length?`<div class="info-note">Not recognised: ${unknowns.slice(0,3).join(', ')}</div>`:''}<button class="confirm-btn" onclick="closeModal()">OK — got it</button><button class="cancel-btn" onclick="closeModal()">Close</button></div></div>`;
  }else if(type==='pdf'){
    root.innerHTML=`<div class="modal-wrap"><div class="modal"><h3>PDF recipe</h3><p>Paste the recipe text below.</p><textarea id="pdf-text" placeholder="Paste recipe text here..."></textarea><button class="confirm-btn" onclick="processPdfText('${data.filename}')">Parse recipe</button><button class="cancel-btn" onclick="closeModal()">Cancel</button></div></div>`;
  }
}
function processPdfText(fn){const t=document.getElementById('pdf-text').value;closeModal();processText(t,fn);}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function globalSearch(query){
  const q=query.toLowerCase().trim();
  if(!q){document.querySelectorAll('.card,.ing-row,.equip-card').forEach(el=>el.style.display='');return;}
  document.querySelectorAll('.card,.ing-row,.equip-card').forEach(card=>{card.style.display=card.innerText.toLowerCase().includes(q)?'':'none';});
}

switchSpirit('rum');
switchRumStill('air');
</script>
</body>
</html>
