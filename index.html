<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distilling Price Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1c1a17;
  --bg2:#242019;
  --bg3:#2e2a22;
  --bg4:#38322a;
  --copper:#b5621e;
  --copper-light:#d4834a;
  --copper-pale:#f0d4b8;
  --oak:#8c6240;
  --oak-light:#a87850;
  --parchment:#f0e8d8;
  --parchment-dim:#c8b898;
  --parchment-muted:#8a7a68;
  --green:#4a8c50;
  --green-light:#6aac70;
  --green-bg:#1e2e20;
  --green-border:#3a6040;
  --blue:#3a6a9a;
  --blue-light:#5a8aba;
  --blue-bg:#1a2a3a;
  --blue-border:#2a4a6a;
  --purple:#7a4a9a;
  --purple-light:#9a6aba;
  --purple-bg:#2a1a3a;
  --purple-border:#5a3a7a;
  --border:#3a3228;
  --border-light:#4a4238;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--parchment);font-size:14px;}
.t{background:var(--bg);border-radius:14px;overflow:hidden;max-width:900px;margin:0 auto;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--copper);padding:16px 18px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.hdr-left h1{font-size:17px;font-weight:600;color:var(--parchment);letter-spacing:0.3px}
.hdr-left p{font-size:11px;color:var(--copper-light);margin-top:3px;letter-spacing:0.2px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hdr-search{background:var(--bg4);border:1px solid var(--border-light);border-radius:6px;padding:6px 10px;color:var(--parchment);font-size:12px;width:160px;}
.hdr-search:focus{outline:none;border-color:var(--copper);}
.hdr-btn{background:var(--copper);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;padding:7px 12px;cursor:pointer;letter-spacing:0.2px;white-space:nowrap;}
.hdr-btn:hover{background:var(--copper-light)}

/* Spirit category nav */
.spirit-nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.spirit-btn{padding:10px 16px;font-size:12px;font-weight:600;color:var(--parchment-muted);background:none;border:none;cursor:pointer;text-align:center;border-bottom:3px solid transparent;letter-spacing:0.3px;white-space:nowrap;transition:color 0.15s;}
.spirit-btn.active-rum{color:#d4834a;border-bottom-color:#b5621e;}
.spirit-btn.active-vodka{color:#5a8aba;border-bottom-color:#3a6a9a;}
.spirit-btn.active-gin{color:#9a6aba;border-bottom-color:#7a4a9a;}
.spirit-btn.active-equip{color:var(--green-light);border-bottom-color:var(--green);}
.spirit-btn.active-freight{color:var(--oak-light);border-bottom-color:var(--oak);}
.spirit-btn.active-prices{color:var(--copper-pale);border-bottom-color:var(--copper);}
.spirit-btn:hover:not([class*="active"]){color:var(--parchment-dim);}

/* Still sub-nav */
.still-nav{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);padding:0 14px;gap:4px;}
.still-btn{padding:8px 14px;font-size:11px;color:var(--parchment-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.15s;}
.still-btn.active{color:var(--parchment);border-bottom-color:var(--copper-light);font-weight:600;}
.still-btn:hover:not(.active){color:var(--parchment-dim);}

/* Recipe variant tabs */
.tabs{display:flex;gap:4px;padding:12px 14px 0;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{font-size:11px;padding:7px 13px;border:1px solid var(--border-light);border-bottom:none;border-radius:7px 7px 0 0;cursor:pointer;background:var(--bg3);color:var(--parchment-muted);white-space:nowrap;letter-spacing:0.2px;display:flex;align-items:center;gap:4px;}
.tab.active{background:var(--bg4);color:var(--parchment);border-color:var(--border-light);}
.tab .del{font-size:13px;color:var(--parchment-muted);}
.tab .del:hover{color:#e05540;}
.panel{display:none;padding:14px;}
.panel.active{display:block;}

/* Still badge */
.still-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.4px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
.still-badge.air{background:rgba(90,138,186,0.2);color:#5a8aba;border:1px solid #3a6a9a;}
.still-badge.reflux{background:rgba(74,140,80,0.2);color:#6aac70;border:1px solid #3a6040;}

.card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.card h2{font-size:13px;font-weight:600;color:var(--copper-pale);margin-bottom:3px;letter-spacing:0.3px;}
.card .desc{font-size:11px;color:var(--parchment-muted);margin-bottom:12px;line-height:1.5;}
.card .still-info{font-size:11px;color:var(--parchment-muted);margin-bottom:10px;padding:8px 10px;background:var(--bg4);border-radius:6px;border-left:3px solid var(--copper);line-height:1.5;}

.ing-row{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap;}
.ing-row:last-child{border-bottom:none;}
.ing-left{min-width:110px;flex:1;}
.ing-name{font-size:12px;color:var(--parchment);}
.ing-sub{font-size:11px;color:var(--parchment-muted);margin-top:2px;}
.price-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.ptag{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--bg4);color:var(--parchment-dim);border:1px solid var(--border-light);white-space:nowrap;}
.ptag.best{background:var(--green-bg);color:var(--green-light);border-color:var(--green-border);font-weight:600;}
.ptag.unknown{background:var(--bg4);color:var(--oak-light);border-color:var(--oak);}

.sec-title{font-size:10px;font-weight:600;color:var(--copper);text-transform:uppercase;letter-spacing:0.8px;margin:10px 0 7px;}
.totals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin-bottom:8px;}
.sup-card{background:var(--bg4);border:1px solid var(--border-light);border-radius:8px;padding:10px 12px;}
.sup-card.best-s{border-color:var(--green-border);background:var(--green-bg);}
.sup-card .sname{font-size:10px;color:var(--parchment-muted);margin-bottom:3px;letter-spacing:0.2px;}
.sup-card.best-s .sname{color:var(--green-light);font-weight:600;}
.sup-card .samount{font-size:16px;font-weight:600;color:var(--parchment);}
.sup-card.best-s .samount{color:var(--green-light);}
.sup-card .sfreight{font-size:10px;color:var(--copper-light);margin-top:2px;}
.sup-card .spl{font-size:10px;color:var(--parchment-muted);margin-top:2px;}

.edit-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);}
.edit-row:last-child{border-bottom:none;}
.edit-row label{font-size:12px;color:var(--parchment-dim);flex:1;}
.edit-row input{width:72px;padding:5px 8px;border:1px solid var(--border-light);border-radius:6px;font-size:12px;text-align:right;background:var(--bg4);color:var(--parchment);}
.edit-row input:focus{outline:none;border-color:var(--copper);}
.edit-row .unit{font-size:10px;color:var(--parchment-muted);min-width:28px;}

.info-note{background:var(--bg4);border:1px solid var(--oak);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--copper-pale);margin-bottom:12px;line-height:1.6;}
.sup-url{font-size:10px;color:var(--oak-light);margin-bottom:10px;}
.sup-url a{color:var(--copper-light);}
.footnote{font-size:10px;color:var(--parchment-muted);font-style:italic;margin-top:3px;}

.upload-drop{border:1.5px dashed var(--border-light);border-radius:10px;padding:20px 16px;text-align:center;cursor:pointer;background:var(--bg3);margin-bottom:14px;}
.upload-drop:hover{border-color:var(--copper);}
.upload-drop p{font-size:13px;color:var(--parchment-dim);}
.upload-drop small{font-size:11px;color:var(--parchment-muted);}

.cat-header{font-size:10px;font-weight:600;color:var(--copper);text-transform:uppercase;letter-spacing:0.6px;margin:14px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.add-equip-bar{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.add-equip-bar h3{font-size:13px;font-weight:600;color:var(--copper-pale);margin-bottom:10px;}
.add-equip-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.add-equip-fields input,.add-equip-fields select{padding:7px 9px;border:1px solid var(--border-light);border-radius:6px;font-size:12px;background:var(--bg4);color:var(--parchment);width:100%;}
.add-equip-fields input:focus,.add-equip-fields select:focus{outline:none;border-color:var(--copper);}
.add-equip-fields select option{background:var(--bg3);}
.add-equip-name{grid-column:1 / -1;}
.add-equip-btn{width:100%;padding:9px;background:var(--copper);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.2px;}
.add-equip-btn:hover{background:var(--copper-light);}

.equip-item-card{background:var(--bg4);border:1px solid var(--border-light);border-radius:9px;padding:12px 14px;margin-bottom:8px;}
.equip-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.equip-item-name{font-size:13px;font-weight:500;color:var(--parchment);}
.equip-item-meta{font-size:11px;color:var(--parchment-muted);margin-top:2px;}
.del-btn{font-size:11px;color:#e05540;background:rgba(224,85,64,0.12);border:1px solid rgba(224,85,64,0.3);border-radius:5px;padding:3px 8px;cursor:pointer;}

.sup-price-row{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--bg3);border-radius:6px;border:1px solid var(--border);margin-bottom:4px;}
.sup-price-row.best-row{background:var(--green-bg);border-color:var(--green-border);}
.sup-price-row .sup-label{font-size:11px;font-weight:500;color:var(--parchment-dim);min-width:60px;}
.sup-price-row.best-row .sup-label{color:var(--green-light);}
.sup-price-row .search-link{font-size:10px;color:var(--copper-light);text-decoration:none;padding:2px 7px;background:rgba(181,98,30,0.15);border:1px solid rgba(181,98,30,0.3);border-radius:4px;white-space:nowrap;}
.sup-price-row .search-link:hover{background:rgba(181,98,30,0.25);}
.sup-price-row .price-input{width:68px;padding:4px 7px;border:1px solid var(--border-light);border-radius:5px;font-size:12px;text-align:right;background:var(--bg2);color:var(--parchment);margin-left:auto;}
.sup-price-row .price-input:focus{outline:none;border-color:var(--copper);}
.sup-price-row .landed-val{font-size:11px;font-weight:600;color:var(--green-light);min-width:54px;text-align:right;}
.sup-price-row .best-badge{font-size:9px;color:var(--green-light);background:var(--green-bg);border:1px solid var(--green-border);padding:1px 5px;border-radius:4px;font-weight:600;}

.freight-input-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.freight-input-row{display:flex;align-items:center;gap:6px;}
.freight-input-row span{font-size:11px;color:var(--copper-light);}
.freight-input-row input{width:64px;padding:5px 7px;border:1px solid var(--oak);border-radius:5px;font-size:12px;text-align:right;background:var(--bg4);color:var(--parchment);}
.freight-input-row input:focus{outline:none;border-color:var(--copper);}

.modal-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;}
.modal{background:var(--bg3);border:1px solid var(--border-light);border-radius:14px;padding:22px;width:100%;max-width:400px;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--parchment);}
.modal p{font-size:12px;color:var(--parchment-muted);margin-bottom:12px;line-height:1.5;}
.modal input[type=text],.modal input[type=number],.modal textarea,.modal select{width:100%;padding:8px 10px;border:1px solid var(--border-light);border-radius:7px;font-size:13px;margin-bottom:10px;background:var(--bg4);color:var(--parchment);}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--copper);}
.modal textarea{height:100px;resize:vertical;}
.choice-row{display:flex;gap:8px;margin-bottom:10px;}
.choice-btn{flex:1;padding:8px 10px;border:1px solid var(--border-light);border-radius:7px;font-size:12px;cursor:pointer;background:var(--bg4);color:var(--parchment-dim);text-align:center;}
.choice-btn.selected{background:var(--copper);color:#fff;border-color:var(--copper);}
.confirm-btn{width:100%;padding:10px;background:var(--copper);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;}
.confirm-btn:hover{background:var(--copper-light);}
.cancel-btn{width:100%;padding:8px;background:transparent;color:var(--parchment-muted);border:none;font-size:12px;cursor:pointer;margin-top:2px;}
.parsed-preview{background:var(--green-bg);border:1px solid var(--green-border);border-radius:7px;padding:10px 12px;font-size:12px;color:var(--green-light);line-height:1.8;margin-bottom:10px;}

/* Pro/Con notes in gin */
.pro-con{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pro-box,.con-box{padding:8px 10px;border-radius:7px;font-size:11px;line-height:1.6;}
.pro-box{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green-light);}
.con-box{background:rgba(180,60,40,0.12);border:1px solid rgba(180,60,40,0.3);color:#c07060;}
.pro-box strong,.con-box strong{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
</style>
</head>
<body>
<div class="t">
  <div class="hdr">
    <div class="hdr-left">
      <h1>Distilling Price Tracker</h1>
      <p>Landed cost — product + freight — across all suppliers</p>
    </div>
    <div class="hdr-right">
      <input type="text" class="hdr-search" placeholder="Search..." oninput="globalSearch(this.value)">
      <button class="hdr-btn" onclick="triggerUpload()">Upload recipe</button>
    </div>
  </div>

  <!-- Spirit category nav -->
  <div class="spirit-nav" id="spirit-nav">
    <button class="spirit-btn" id="snav-rum" onclick="switchSpirit('rum')">🥃 Rum</button>
    <button class="spirit-btn" id="snav-vodka" onclick="switchSpirit('vodka')">🫙 Vodka</button>
    <button class="spirit-btn" id="snav-gin" onclick="switchSpirit('gin')">🌿 Gin</button>
    <button class="spirit-btn" id="snav-equipment" onclick="switchSpirit('equipment')">⚙️ Equipment</button>
    <button class="spirit-btn" id="snav-freight" onclick="switchSpirit('freight')">📦 Freight</button>
    <button class="spirit-btn" id="snav-prices" onclick="switchSpirit('prices')">💲 Prices</button>
  </div>

  <!-- Rum section -->
  <div id="section-rum" style="display:none;">
    <div class="still-nav">
      <button class="still-btn" id="rstill-air" onclick="switchRumStill('air')">4.5L Air Still</button>
      <button class="still-btn" id="rstill-reflux" onclick="switchRumStill('reflux')">23L Reflux Still</button>
    </div>
    <div class="tabs" id="rum-tabs"></div>
    <div id="rum-panels"></div>
  </div>

  <!-- Vodka section -->
  <div id="section-vodka" style="display:none;">
    <div class="still-nav">
      <button class="still-btn" id="vstill-air" onclick="switchVodkaStill('air')">4.5L Air Still</button>
      <button class="still-btn" id="vstill-reflux" onclick="switchVodkaStill('reflux')">23L Reflux Still</button>
    </div>
    <div class="tabs" id="vodka-tabs"></div>
    <div id="vodka-panels"></div>
  </div>

  <!-- Gin section -->
  <div id="section-gin" style="display:none;">
    <div class="still-nav">
      <button class="still-btn" id="gstill-air" onclick="switchGinStill('air')">4.5L Air Still</button>
      <button class="still-btn" id="gstill-reflux" onclick="switchGinStill('reflux')">23L Reflux Still</button>
    </div>
    <div class="tabs" id="gin-tabs"></div>
    <div id="gin-panels"></div>
  </div>

  <div id="section-equipment" style="display:none;padding:14px"><div id="equip-panel"></div></div>
  <div id="section-freight" style="display:none;padding:14px"><div id="freight-panel"></div></div>
  <div id="section-prices" style="display:none;padding:14px"><div id="prices-panel"></div></div>
</div>

<div id="modal-root"></div>
<input type="file" id="file-input" accept=".txt,.docx,.pdf" style="display:none" onchange="handleFile(this)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script>
// ── SUPPLIERS ──────────────────────────────────────────────────────────────
const SUPS=[
  {id:'hoppy',   name:'Hoppy Days',        short:'Hoppy',   url:'hoppydays.com.au',           search:'https://hoppydays.com.au/search?q='},
  {id:'kegland', name:'Kegland',           short:'Kegland', url:'kegland.com.au',             search:'https://www.kegland.com.au/search?q='},
  {id:'beerco',  name:'Beer Co',           short:'BeerCo',  url:'beerco.com.au',              search:'https://beerco.com.au/search?q='},
  {id:'quality', name:'Quality Homebrew',  short:'Quality', url:'qualityhomebrew.com.au',     search:'https://www.qualityhomebrew.com.au/search?q='},
  {id:'five',    name:'5 Star Distilling', short:'5 Star',  url:'5stardistilling.com',        search:'https://www.5stardistilling.com/search?q='},
  {id:'adel',    name:'Adelaide Barrels',  short:'Adelaide',url:'adelaidewinebarrels.com.au', search:'https://adelaidewinebarrels.com.au/?s='},
];

const FREIGHT={
  hoppy:  {rate:12.00,freeOver:100},
  kegland:{rate:10.95,freeOver:150},
  beerco: {rate:13.00,freeOver:120},
  quality:{rate:11.50,freeOver:100},
  five:   {rate:12.50,freeOver:120},
  adel:   {rate:15.00,freeOver:null},
};

function freight(sid,total){const f=FREIGHT[sid];if(!f)return 0;if(f.freeOver!=null&&total>=f.freeOver)return 0;return f.rate;}

// ── INGREDIENTS ───────────────────────────────────────────────────────────
const INGS=[
  // Rum base
  {id:'maize',    name:'Rolled/flaked maize',          unit:'/kg',   cat:'Grains',      keywords:['maize','flaked corn','rolled corn'],              p:{hoppy:4.88, kegland:null, beerco:4.95, quality:5.10, five:5.20, adel:null}},
  {id:'rye',      name:'Ryecorn malt',                 unit:'/kg',   cat:'Grains',      keywords:['rye','ryecorn','rye malt'],                       p:{hoppy:3.56, kegland:null, beerco:3.70, quality:3.65, five:3.80, adel:null}},
  {id:'malt',     name:'Distillers malt Laureate',     unit:'/kg',   cat:'Grains',      keywords:['distillers malt','laureate'],                     p:{hoppy:2.32, kegland:null, beerco:2.45, quality:2.40, five:2.50, adel:null}},
  {id:'munich',   name:'Dark Munich malt',             unit:'/kg',   cat:'Grains',      keywords:['munich','dark munich'],                           p:{hoppy:3.76, kegland:null, beerco:3.90, quality:3.85, five:4.00, adel:null}},
  {id:'bsmol',    name:'Blackstrap molasses',          unit:'/kg',   cat:'Sugars',      keywords:['blackstrap','black strap'],                       p:{hoppy:3.50, kegland:null, beerco:3.60, quality:3.55, five:3.70, adel:null}},
  {id:'bundmol',  name:'Bundaberg refinery molasses',  unit:'/kg',   cat:'Sugars',      keywords:['bundaberg','refinery molasses'],                  p:{hoppy:4.20, kegland:null, beerco:4.30, quality:4.25, five:4.40, adel:null}},
  {id:'bsugar',   name:'Brown sugar',                  unit:'/kg',   cat:'Sugars',      keywords:['brown sugar','raw sugar'],                        p:{hoppy:2.00, kegland:null, beerco:2.10, quality:2.05, five:null, adel:null}},
  // Vodka base
  {id:'wsugar',   name:'White cane sugar',             unit:'/kg',   cat:'Sugars',      keywords:['white sugar','cane sugar','plain sugar'],         p:{hoppy:1.80, kegland:null, beerco:1.90, quality:1.85, five:null, adel:null}},
  {id:'wheat',    name:'Flaked wheat',                 unit:'/kg',   cat:'Grains',      keywords:['wheat','flaked wheat','wheat malt'],              p:{hoppy:3.20, kegland:null, beerco:3.35, quality:3.25, five:3.40, adel:null}},
  {id:'barley',   name:'Pale malt (barley)',           unit:'/kg',   cat:'Grains',      keywords:['pale malt','barley','2 row'],                     p:{hoppy:2.10, kegland:null, beerco:2.25, quality:2.15, five:2.30, adel:null}},
  {id:'potato',   name:'Potato flakes (dehydrated)',   unit:'/kg',   cat:'Grains',      keywords:['potato','potato flakes'],                        p:{hoppy:null, kegland:null, beerco:null, quality:null, five:6.50, adel:null}},

    items:[{id:'juniper',qty:4,lbl:'200g'},{id:'coriandr',qty:2,lbl:'100g'},{id:'angelica',qty:1,lbl:'50g'},{id:'orispeel',qty:1,lbl:'50g'},{id:'cassia',qty:1,lbl:'50g'},{id:'cubeb',qty:1,lbl:'50g'},{id:'cardamom',qty:1,lbl:'50g'}]
  },
  gin_compound_reflux:{
    title:'Compound gin (cold mac)',stillType:'reflux',spirit:'gin',builtin:true,
    desc:'Cold maceration in large neutral batch · fast production at volume',
    litres:23,
    stillNote:'No still run for the gin itself — use 23L of pre-made neutral spirit (from reflux still) as the base. Macerate botanicals 24–72hrs then fine filter. Produces ~20L of compound gin at drinking strength.',
    prosCons:{pros:'Massive yield with zero gin distillation time · highly adjustable · botanical tweaking easy',cons:'Not legally distilled gin · bitterness risk if over-macerated · quality ceiling lower than pot/column distilled'},
    items:[{id:'juniper',qty:6,lbl:'300g'},{id:'coriandr',qty:3,lbl:'150g'},{id:'orispeel',qty:2,lbl:'100g'},{id:'lempeel',qty:1,lbl:'50g'},{id:'cardamom',qty:1,lbl:'50g'},{id:'cassia',qty:1,lbl:'50g'}]
  },
};

// ── STATE ─────────────────────────────────────────────────────────────────
let activeSpirit='rum';
let activeRumStill='air',activeRumTab='bourbon_air';
let activeVodkaStill='air',activeVodkaTab='vod_sugar_air';
let activeGinStill='air',activeGinTab='gin_sugarneutral_air';
let customRecipes={};
let pendingRecipe=null;

// ── HELPERS ────────────────────────────────────────────────────────────────
function ingById(id){return INGS.find(i=>i.id===id);}
function fmt(n){return n==null?'—':'$'+n.toFixed(2);}
function fmtF(n){return n===0?'Free ship':'+ $'+n.toFixed(2)+' freight';}
function allEquip(){return[...BUILTIN_EQUIP,...customEquip];}
function bestLanded(item){let b=null,bc=Infinity;SUPS.forEach(s=>{const p=item.p[s.id];if(p!=null){const l=p+freight(s.id,p);if(l<bc){bc=l;b=s.id;}}});return b;}

function recipeTotals(items,litres){
  const totals={};
  SUPS.forEach(s=>{
    let t=0,ok=true;
    items.forEach(it=>{const i=ingById(it.id);const p=i?i.p[s.id]:null;if(p==null)ok=false;else t+=p*it.qty;});
    if(ok){const f=freight(s.id,t);totals[s.id]={products:t,freight:f,total:t+f};}else totals[s.id]=null;
  });
  let best=null,bc=Infinity;
  Object.entries(totals).forEach(([sid,v])=>{if(v!=null&&v.total<bc){bc=v.total;best=sid;}});
  return{totals,best};
}

// ── RECIPE HTML BUILDER ────────────────────────────────────────────────────
function buildRecipeHTML(recipe){
  const{totals,best}=recipeTotals(recipe.items,recipe.litres);
  const stillLabel=recipe.stillType==='air'?'4.5L Air Still':'23L Reflux Still';
  const stillClass=recipe.stillType==='air'?'air':'reflux';

  let ih='';
  recipe.items.forEach(it=>{
    const i=ingById(it.id);
    if(!i){ih+=`<div class="ing-row"><div class="ing-left"><div class="ing-name">${it.id}</div><div class="ing-sub">${it.lbl}</div></div><div class="price-tags"><span class="ptag unknown">Not priced</span></div></div>`;return;}
    let b=null,bc=Infinity;
    SUPS.forEach(s=>{const p=i.p[s.id];if(p!=null&&p*it.qty<bc){bc=p*it.qty;b=s.id;}});
    let tags='';
    SUPS.forEach(s=>{const p=i.p[s.id];if(p==null)return;tags+=`<span class="ptag ${s.id===b?'best':''}">${s.short}: ${fmt(p*it.qty)}</span>`;});
    ih+=`<div class="ing-row"><div class="ing-left"><div class="ing-name">${i.name}</div><div class="ing-sub">${it.lbl}</div></div><div class="price-tags">${tags||'<span class="ptag unknown">Not priced</span>'}</div></div>`;
  });

  // Pro/con block for vodka/gin
  let pcHTML='';
  if(recipe.prosCons){
    pcHTML=`<div class="pro-con">
      <div class="pro-box"><strong>✓ Pros</strong>${recipe.prosCons.pros}</div>
      <div class="con-box"><strong>✗ Cons</strong>${recipe.prosCons.cons}</div>
    </div>`;
  }

  let th='';
  SUPS.forEach(s=>{
    const v=totals[s.id];if(v==null)return;
    const isBest=s.id===best;
    th+=`<div class="sup-card ${isBest?'best-s':''}"><div class="sname">${s.name}${isBest?' ✓':''}</div><div class="samount">${fmt(v.total)}</div><div class="sfreight">${fmtF(v.freight)}</div><div class="spl">Products: ${fmt(v.products)} · ${fmt(v.total/recipe.litres)}/L wash</div></div>`;
  });

  return `<div class="card">
    <h2>${recipe.title} <span class="still-badge ${stillClass}">${stillLabel}</span></h2>
    <p class="desc">${recipe.desc}</p>
    ${recipe.stillNote?`<div class="still-info">${recipe.stillNote}</div>`:''}
    ${pcHTML}
    ${ih}
  </div>
  <p class="sec-title">Landed cost by supplier</p>
  <div class="totals-grid">${th||'<p class="footnote">No supplier stocks all ingredients.</p>'}</div>
  <p class="footnote">Freight applied automatically. ${recipe.litres}L wash basis.</p>`;
}

// ── RENDER SPIRITS ─────────────────────────────────────────────────────────
function getRecipeSet(spirit,still){
  const sets={
    rum:{air:RUM_AIR,reflux:RUM_REFLUX},
    vodka:{air:VODKA_AIR,reflux:VODKA_REFLUX},
    gin:{air:GIN_AIR,reflux:GIN_REFLUX},
  };
  return sets[spirit]?sets[spirit][still]||{}:{};
}

function getActiveTab(spirit){
  if(spirit==='rum')return activeRumTab;
  if(spirit==='vodka')return activeVodkaTab;
  if(spirit==='gin')return activeGinTab;
  return null;
}
function setActiveTab(spirit,key){
  if(spirit==='rum')activeRumTab=key;
  if(spirit==='vodka')activeVodkaTab=key;
  if(spirit==='gin')activeGinTab=key;
}
function getActiveStill(spirit){
  if(spirit==='rum')return activeRumStill;
  if(spirit==='vodka')return activeVodkaStill;
  if(spirit==='gin')return activeGinStill;
  return 'air';
}

function renderSpiritSection(spirit){
  const still=getActiveStill(spirit);
  const recipes=getRecipeSet(spirit,still);
  const activeTab=getActiveTab(spirit);
  const tabsEl=document.getElementById(spirit+'-tabs');
  const panelsEl=document.getElementById(spirit+'-panels');
  if(!tabsEl||!panelsEl)return;

  tabsEl.innerHTML='';
  panelsEl.innerHTML='';

  Object.entries(recipes).forEach(([key,r])=>{
    const isActive=key===activeTab;
    const tab=document.createElement('div');
    tab.className='tab'+(isActive?' active':'');
    tab.textContent=r.title;
    tab.onclick=()=>switchSpiritTab(spirit,key);
    tabsEl.appendChild(tab);

    const panel=document.createElement('div');
    panel.id=`panel-${spirit}-${key}`;
    panel.className='panel'+(isActive?' active':'');
    panel.innerHTML=buildRecipeHTML(r);
    panelsEl.appendChild(panel);
  });
}

function switchSpiritTab(spirit,key){
  setActiveTab(spirit,key);
  const still=getActiveStill(spirit);
  const recipes=getRecipeSet(spirit,still);
  document.querySelectorAll(`#${spirit}-tabs .tab`).forEach((t,i)=>{
    t.classList.toggle('active',Object.keys(recipes)[i]===key);
  });
  document.querySelectorAll(`#${spirit}-panels .panel`).forEach(p=>p.classList.remove('active'));
  const el=document.getElementById(`panel-${spirit}-${key}`);
  if(el)el.classList.add('active');
}

// ── STILL SWITCHING ────────────────────────────────────────────────────────
function switchRumStill(still){
  activeRumStill=still;
  activeRumTab=still==='air'?'bourbon_air':'bourbon_reflux';
  document.getElementById('rstill-air').classList.toggle('active',still==='air');
  document.getElementById('rstill-reflux').classList.toggle('active',still==='reflux');
  renderSpiritSection('rum');
}
function switchVodkaStill(still){
  activeVodkaStill=still;
  activeVodkaTab=still==='air'?'vod_sugar_air':'vod_sugar_reflux';
  document.getElementById('vstill-air').classList.toggle('active',still==='air');
  document.getElementById('vstill-reflux').classList.toggle('active',still==='reflux');
  renderSpiritSection('vodka');
}
function switchGinStill(still){
  activeGinStill=still;
  activeGinTab=still==='air'?'gin_sugarneutral_air':'gin_sugarneutral_reflux';
  document.getElementById('gstill-air').classList.toggle('active',still==='air');
  document.getElementById('gstill-reflux').classList.toggle('active',still==='reflux');
  renderSpiritSection('gin');
}

// ── TOP-LEVEL SECTION SWITCHING ────────────────────────────────────────────
function switchSpirit(name){
  activeSpirit=name;
  ['rum','vodka','gin','equipment','freight','prices'].forEach(s=>{
    const sec=document.getElementById('section-'+s);
    if(sec)sec.style.display=s===name?'block':'none';
  });
  // Update nav button active classes
  document.querySelectorAll('.spirit-btn').forEach(btn=>{
    // Remove all active-* classes
    btn.className='spirit-btn';
  });
  const activeBtn=document.getElementById('snav-'+name);
  if(activeBtn)activeBtn.classList.add('active-'+name);

  if(name==='rum'){renderSpiritSection('rum');switchRumStill(activeRumStill);}
  if(name==='vodka'){renderSpiritSection('vodka');switchVodkaStill(activeVodkaStill);}
  if(name==='gin'){renderSpiritSection('gin');switchGinStill(activeGinStill);}
  if(name==='equipment')renderEquipPanel();
  if(name==='freight')renderFreightPanel();
  if(name==='prices')renderPricesPanel();
}

// ── EQUIPMENT ──────────────────────────────────────────────────────────────
function renderEquipPanel(){
  const panel=document.getElementById('equip-panel');
  const catOpts=EQUIP_CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
  let html=`<div class="add-equip-bar"><h3>Add equipment item</h3><div class="add-equip-fields"><input class="add-equip-name" type="text" id="eq-name" placeholder="Item name (e.g. Refractometer)"><select id="eq-cat">${catOpts}</select><input type="text" id="eq-unit" placeholder="Unit e.g. /ea" value="/ea"></div><button class="add-equip-btn" onclick="addCustomEquip()">Add item — supplier search links appear instantly</button></div>`;
  const groups={};
  allEquip().forEach(item=>{const cat=item.cat||'Custom';if(!groups[cat])groups[cat]=[];groups[cat].push(item);});
  EQUIP_CATS.forEach(cat=>{
    const items=groups[cat];if(!items||!items.length)return;
    html+=`<div class="card"><h2>${cat}</h2><p class="desc">Landed cost inc. freight · tap Search to check current price</p>`;
    items.forEach(item=>{
      const best=bestLanded(item);const isCustom=!!item.custom;
      const st=encodeURIComponent(item.name);
      let rows='';
      SUPS.forEach(s=>{
        const p=item.p[s.id]!=null?item.p[s.id]:null;
        const f=p!=null?freight(s.id,p):0;
        const landed=p!=null?p+f:null;
        const isBest=s.id===best&&landed!=null;
        rows+=`<div class="sup-price-row ${isBest?'best-row':''}">
          <span class="sup-label">${s.short}${isBest?' ✓':''}</span>
          <a href="${s.search+st}" target="_blank" class="search-link">Search</a>
          <input type="number" class="price-input" step="0.01" min="0" value="${p!=null?p:''}" placeholder="—" oninput="updEquipPrice('${item.id}','${s.id}',this.value)">
          <span class="landed-val">${landed!=null?'→ '+fmt(landed):''}</span>
          ${isBest?'<span class="best-badge">best</span>':''}
        </div>`;
      });
      html+=`<div class="equip-item-card"><div class="equip-item-header"><div><div class="equip-item-name">${item.name}</div><div class="equip-item-meta">${item.unit}${isCustom?' · custom':''}</div></div>${isCustom?`<button class="del-btn" onclick="delCustomEquip('${item.id}')">Remove</button>`:''}</div>${rows}</div>`;
    });
    html+=`</div>`;
  });
  panel.innerHTML=html;
}
function addCustomEquip(){
  const name=document.getElementById('eq-name').value.trim();
  const cat=document.getElementById('eq-cat').value;
  const unit=document.getElementById('eq-unit').value.trim()||'/ea';
  if(!name){alert('Enter an item name.');return;}
  const p={};SUPS.forEach(s=>p[s.id]=null);
  customEquip.push({id:'custom_'+Date.now(),name,cat,unit,p,custom:true});
  document.getElementById('eq-name').value='';
  renderEquipPanel();
}
function delCustomEquip(id){if(!confirm('Remove this item?'))return;customEquip=customEquip.filter(i=>i.id!==id);renderEquipPanel();}
function updEquipPrice(itemId,supId,val){
  const price=(val==='')?null:(parseFloat(val)||null);
  const bi=BUILTIN_EQUIP.find(i=>i.id===itemId);
  if(bi)bi.p[supId]=price;
  else{const ci=customEquip.find(i=>i.id===itemId);if(ci)ci.p[supId]=price;}
  renderEquipPanel();
}

// ── FREIGHT ────────────────────────────────────────────────────────────────
function renderFreightPanel(){
  let h='<div class="info-note">Set your flat freight rate per supplier. Orders over the free threshold ship at no cost — freight drops to $0 automatically across all calculations.</div>';
  h+='<div class="card"><h2>Freight rates — your QLD postcode</h2><p class="desc">Update whenever rates change</p>';
  SUPS.forEach(s=>{
    const f=FREIGHT[s.id];
    h+=`<div class="ing-row"><div class="ing-left"><div class="ing-name">${s.name}</div><div class="ing-sub"><a href="https://${s.url}" target="_blank" style="color:var(--copper-light)">${s.url}</a></div></div>
    <div class="freight-input-wrap">
      <div class="freight-input-row"><span>Flat $</span><input type="number" step="0.50" min="0" value="${f.rate}" oninput="updFreight('${s.id}','rate',this.value)"></div>
      <div class="freight-input-row"><span>Free over $</span><input type="number" step="5" min="0" value="${f.freeOver==null?'':f.freeOver}" placeholder="—" oninput="updFreight('${s.id}','freeOver',this.value)"></div>
    </div></div>`;
  });
  h+='</div><p class="footnote">Freight is factored into every recipe total and equipment landed cost automatically.</p>';
  document.getElementById('freight-panel').innerHTML=h;
}
function updFreight(supId,field,val){
  if(field==='rate')FREIGHT[supId].rate=(val==='')?0:(parseFloat(val)||0);
  if(field==='freeOver')FREIGHT[supId].freeOver=(val==='')?null:(parseFloat(val)||null);
  // Refresh active spirit section
  if(activeSpirit==='rum')renderSpiritSection('rum');
  if(activeSpirit==='vodka')renderSpiritSection('vodka');
  if(activeSpirit==='gin')renderSpiritSection('gin');
  if(activeSpirit==='equipment')renderEquipPanel();
}

// ── PRICES ─────────────────────────────────────────────────────────────────
function renderPricesPanel(){
  let h='<div class="info-note">Update ingredient prices here. Equipment prices are managed in the Equipment tab via supplier search links.</div>';
  const ingCats=[...new Set(INGS.map(i=>i.cat))];
  SUPS.forEach(s=>{
    let rows='';
    ingCats.forEach(cat=>{
      const catIngs=INGS.filter(i=>i.cat===cat&&i.p[s.id]!==undefined);
      if(!catIngs.length)return;
      rows+=`<p class="cat-header">${cat}</p>`;
      catIngs.forEach(i=>{
        const v=i.p[s.id];
        rows+=`<div class="edit-row"><label>${i.name}</label><input type="number" step="0.01" min="0" value="${v==null?'':v}" placeholder="—" oninput="updIngP('${i.id}','${s.id}',this.value)"><span class="unit">${i.unit}</span></div>`;
      });
    });
    h+=`<div class="card"><h2>${s.name}</h2><p class="sup-url"><a href="https://${s.url}" target="_blank">${s.url}</a></p>${rows}</div>`;
  });
  document.getElementById('prices-panel').innerHTML=h;
}
function updIngP(ingId,supId,val){
  const i=INGS.find(x=>x.id===ingId);if(!i)return;
  i.p[supId]=(val==='')?null:(parseFloat(val)||null);
  if(activeSpirit==='rum')renderSpiritSection('rum');
  if(activeSpirit==='vodka')renderSpiritSection('vodka');
  if(activeSpirit==='gin')renderSpiritSection('gin');
}

// ── FILE UPLOAD ────────────────────────────────────────────────────────────
function triggerUpload(){document.getElementById('file-input').click();}
function handleFile(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='txt'){const r=new FileReader();r.onload=e=>processText(e.target.result,file.name);r.readAsText(file);}
  else if(ext==='docx'){const r=new FileReader();r.onload=e=>{if(typeof mammoth!=='undefined'){mammoth.extractRawText({arrayBuffer:e.target.result}).then(res=>processText(res.value,file.name)).catch(()=>processText('',file.name));}else{processText('',file.name);}};r.readAsArrayBuffer(file);}
  else if(ext==='pdf'){showModal('pdf',{filename:file.name});}
  input.value='';
}
function processText(text,filename){
  const lines=text.split('\n');const items=[],unknowns=[];let litres=25;
  const lm=text.match(/(\d+)\s*L\s*(wash|batch)/i)||text.match(/(\d+)\s*litre/i);
  if(lm)litres=parseInt(lm[1]);
  lines.forEach(line=>{
    if(!line.trim()||line.length<4)return;
    const ll=line.toLowerCase();let matched=false;
    INGS.forEach(ing=>{
      if(matched)return;if(!ing.keywords.some(k=>ll.includes(k)))return;
      let qty=1,lbl='1 unit';
      const m=line.match(/(\d+\.?\d*)\s*(kg|g|lb|pkt|packet)/i);
      if(m){qty=parseFloat(m[1]);lbl=`${m[1]} ${m[2]}`;if(m[2].toLowerCase()==='g')qty/=1000;}
      items.push({id:ing.id,qty,lbl});matched=true;
    });
    if(!matched&&line.match(/\d/)&&!line.match(/^(step|method|note|tip|warning|figure|#)/i))unknowns.push(line.trim().slice(0,60));
  });
  const title=filename.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  pendingRecipe={title,litres,items,unknowns,desc:'Uploaded recipe'};
  showModal('confirm',{title,items,unknowns,litres});
}

function showModal(type,data){
  const root=document.getElementById('modal-root');
  if(type==='confirm'){
    const{title,items,unknowns,litres}=data;
    const preview=items.map(it=>`<div>+ <strong>${ingById(it.id)?ingById(it.id).name:it.id}</strong> — ${it.lbl}</div>`).join('');
    root.innerHTML=`<div class="modal-wrap"><div class="modal">
      <h3>Recipe detected</h3>
      <p>Found ${items.length} ingredient(s) in a ${litres}L batch.</p>
      <input type="text" id="rname" value="${title}">
      <div class="parsed-preview">${preview||'No recognised ingredients.'}</div>
      ${unknowns.length?`<div class="info-note">Not recognised: ${unknowns.slice(0,3).join(', ')}</div>`:''}
      <button class="confirm-btn" onclick="confirmRecipe()">Add to tracker</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div></div>`;
  } else if(type==='pdf'){
    root.innerHTML=`<div class="modal-wrap"><div class="modal">
      <h3>PDF recipe</h3><p>Paste the recipe text below.</p>
      <textarea id="pdf-text" placeholder="Paste recipe text here..."></textarea>
      <button class="confirm-btn" onclick="processPdfText('${data.filename}')">Parse recipe</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div></div>`;
  }
}
function confirmRecipe(){
  if(!pendingRecipe)return;
  const name=document.getElementById('rname').value.trim();
  alert('Custom recipes from upload will be added as a future feature — for now, add ingredients via the Prices tab and edit recipe items in code.');
  closeModal();
}
function processPdfText(fn){const t=document.getElementById('pdf-text').value;closeModal();processText(t,fn);}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ── SEARCH ─────────────────────────────────────────────────────────────────
function globalSearch(query){
  const q=query.toLowerCase().trim();
  if(!q){
    document.querySelectorAll('.card,.ing-row,.equip-item-card').forEach(el=>el.style.display='');
    return;
  }
  document.querySelectorAll('.card,.ing-row,.equip-item-card').forEach(card=>{
    card.style.display=card.innerText.toLowerCase().includes(q)?'':'none';
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
switchSpirit('rum');
switchRumStill('air');
</script>
